<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Urna check</title>
</head>

<body>
    <div class="modal">
        <div class="icon">
            <svg width="100" height="100" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="8" width="18" height="10" rx="2" fill="#1e3a8a" />
                <rect x="7" y="3" width="10" height="6" rx="1" fill="#2563eb" />
                <rect x="10" y="10" width="4" height="2" fill="#22c55e" />
            </svg>
        </div>
        <header>
            <h1>Verifique sua idade</h1>
            <p>Digite sua idade para verificar se precisa votar</p>
        </header>
        <div class="verificar">
            <p>Sua idade</p>
            <input type="date" id="date" placeholder="Digite sua idade">
            <button id="check">Verificar</button>
            <div id="res"></div>
        </div>
        <footer>
            <p>Seu voto, sua voz. Participe!</p>
        </footer>
    </div>
</body>
<script type="module" src="src/index.js"></script>

</html>
